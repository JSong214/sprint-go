server:
  port: 8080
  mode: debug # debug, release, test

# 数据库
database:
  host: localhost
  port: 5432
  user: postgres
  password: your_password # 纯数字加 ""
  dbname: your_db_name
  sslmode: disable
  timezone: Asia/Shanghai

  # 连接池配置
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600 # 秒

# 跨域
cors:
  allow_origins:
    - http://localhost:5173
  allow_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - Accept
    - Authorization
  expose_headers:
    - Content-Length
  allow_credentials: true
  max_age: 43200 # 秒 (12小时)

# JWT 认证
jwt:
  secret: "your-jwt-secret-key"
  expire_hour: 24
  issuer: "your-issuer"
